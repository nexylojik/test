<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Химия — Коллоквиум</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap');
  :root {
    --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;
    --accent:#7c6ff7;--accent2:#4ecdc4;--accent3:#ff6b6b;
    --text:#e8e8f0;--muted:#7a7a9a;--green:#52e09c;--yellow:#ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Golos Text',sans-serif;font-size:15px;line-height:1.7;min-height:100vh;}
  header{padding:1.5rem 2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
  header h1{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:600;color:var(--accent);}
  header .sub{color:var(--muted);font-size:13px;}
  .prog{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
  .prog .bar{width:120px;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
  .prog .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}
  .mode-bar{display:flex;gap:0;padding:.75rem 2rem;border-bottom:1px solid var(--border);overflow-x:auto;}
  .mode-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 16px;font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .mode-btn:first-child{border-radius:8px 0 0 8px;}
  .mode-btn:last-child{border-radius:0 8px 8px 0;}
  .mode-btn:not(:last-child){border-right:none;}
  .mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .mode-btn:hover:not(.active){background:var(--surface2);color:var(--text);}
  .layout{display:flex;min-height:calc(100vh - 120px);}
  .sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--border);padding:1rem 0;overflow-y:auto;position:sticky;top:0;height:calc(100vh - 120px);}
  .sb-sec{padding:6px 1rem;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:.5rem;}
  .sb-item{display:flex;align-items:flex-start;gap:8px;padding:6px 1rem;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;border-left:2px solid transparent;}
  .sb-item span{word-break:break-word;line-height:1.4;}
  .sb-item:hover{color:var(--text);background:var(--surface2);}
  .sb-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(124,111,247,.08);}
  .sb-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;}
  .sb-item.done .dot{background:var(--green);}
  .main{flex:1;padding:1.5rem 2rem;overflow-y:auto;}
  .sec-block{display:none;}
  .sec-block.visible{display:block;}
  .sec-title{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:600;margin-bottom:1.25rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:.75rem;overflow:hidden;}
  .q-card:hover{border-color:#3e3e55;}
  .q-head{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;}
  .q-num{font-family:'Unbounded',sans-serif;font-size:10px;color:var(--muted);flex-shrink:0;margin-top:3px;}
  .q-question{font-weight:500;color:var(--text);flex:1;font-size:14px;}
  .q-arrow{color:var(--muted);font-size:16px;transition:transform .2s;flex-shrink:0;}
  .q-card.open .q-arrow{transform:rotate(180deg);}
  .q-ans{display:none;padding:12px 14px 14px 36px;color:#c8c8e0;font-size:13.5px;line-height:1.75;border-top:1px solid var(--border);}
  .q-card.open .q-ans{display:block;}
  .q-ans b{color:var(--text);}
  .q-ans ul{padding-left:1.2rem;margin:6px 0;}
  .q-ans li{margin-bottom:3px;}
  .formula{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-family:monospace;font-size:12.5px;color:var(--accent2);margin:2px 0;}
  .hl{background:rgba(124,111,247,.1);border-left:3px solid var(--accent);padding:7px 11px;border-radius:0 7px 7px 0;margin:8px 0;font-size:13px;}
  .wn{background:rgba(255,107,107,.09);border-left:3px solid var(--accent3);padding:7px 11px;border-radius:0 7px 7px 0;margin:8px 0;font-size:13px;}
  .key-line{margin-top:10px;font-size:11.5px;color:var(--muted);padding:5px 10px;background:var(--surface2);border-radius:6px;}
  /* FC */
  #flashcard-mode{display:none;}
  .fc-wrap{max-width:560px;margin:0 auto;text-align:center;}
  .fc-counter{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
  .fc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.75rem;cursor:pointer;transition:all .3s;margin-bottom:1.25rem;}
  .fc-card:hover{border-color:var(--accent);}
  .fc-qnum{font-family:'Unbounded',sans-serif;font-size:10px;color:var(--muted);margin-bottom:.75rem;}
  .fc-question{font-size:15px;font-weight:500;color:var(--text);line-height:1.5;}
  .fc-answer{display:none;color:#c8c8e0;font-size:13px;line-height:1.7;margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem;text-align:left;width:100%;}
  .fc-card.revealed .fc-answer{display:block;}
  .fc-hint{font-size:12px;color:var(--muted);margin-bottom:1rem;}
  .fc-actions{display:flex;gap:10px;justify-content:center;margin-top:.75rem;}
  .fc-btn{padding:9px 24px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
  .fc-btn:hover{background:var(--surface);border-color:#4e4e6a;}
  .fc-btn.good{border-color:var(--green);color:var(--green);}
  .fc-btn.good:hover{background:rgba(82,224,156,.1);}
  .fc-btn.bad{border-color:var(--accent3);color:var(--accent3);}
  .fc-btn.bad:hover{background:rgba(255,107,107,.08);}
  .fc-secs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem;justify-content:center;}
  .fc-sb{padding:4px 12px;border-radius:99px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'Golos Text',sans-serif;}
  .fc-sb.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .fc-sb:hover:not(.active){color:var(--text);border-color:#4e4e6a;}
  /* QUIZ */
  #quiz-mode{display:none;}
  .quiz-wrap{max-width:640px;}
  .quiz-q{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem;margin-bottom:.9rem;}
  .quiz-qtext{font-size:14px;font-weight:500;margin-bottom:.85rem;color:var(--text);}
  .quiz-num{font-size:10px;font-family:'Unbounded',sans-serif;color:var(--muted);margin-bottom:5px;}
  .quiz-opts{display:flex;flex-direction:column;gap:7px;}
  .quiz-opt{padding:8px 13px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;text-align:left;font-family:'Golos Text',sans-serif;}
  .quiz-opt:hover:not(.locked){border-color:var(--accent);}
  .quiz-opt.correct{border-color:var(--green);background:rgba(82,224,156,.1);color:var(--green);}
  .quiz-opt.wrong{border-color:var(--accent3);background:rgba(255,107,107,.08);color:var(--accent3);}
  .quiz-explain{display:none;font-size:13px;color:var(--muted);margin-top:9px;padding:7px 11px;background:var(--surface2);border-radius:7px;line-height:1.6;}
  .quiz-q.answered .quiz-explain{display:block;}
  .btn-p{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Golos Text',sans-serif;font-size:14px;cursor:pointer;transition:opacity .2s;}
  .btn-p:hover{opacity:.85;}
  .btn-s{padding:9px 22px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'Golos Text',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;}
  .btn-s:hover{color:var(--text);border-color:#4e4e6a;}
  .score-badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:99px;font-size:13px;font-weight:500;}
  .score-badge.good{background:rgba(82,224,156,.15);color:var(--green);}
  .score-badge.ok{background:rgba(255,209,102,.15);color:var(--yellow);}
  .score-badge.bad{background:rgba(255,107,107,.12);color:var(--accent3);}
  /* ── MacBook 15 (1440px+) ── */
  @media(min-width:1440px){
    .main{max-width:none;padding:2rem 2.5rem;}
    .sidebar{width:280px;}
    .sb-item span{white-space:normal;word-break:break-word;line-height:1.35;}
    body{font-size:16px;}
    .q-question{font-size:15px;}
    .q-ans{font-size:14px;}
    .fc-wrap{max-width:700px;}
    .quiz-wrap{max-width:860px;}
  }

  /* ── Планшет (641–1023px) ── */
  @media(max-width:1023px) and (min-width:641px){
    .sidebar{width:200px;}
    .main{padding:1.25rem 1.5rem;}
  }

  /* ── iPhone 16 и вся мобилка (≤640px) ── */
  @media(max-width:640px){
    /* Скрываем десктопный сайдбар */
    .sidebar{display:none;}

    /* Хедер */
    header{padding:1rem;gap:.75rem;flex-wrap:wrap;}
    header h1{font-size:.85rem;}
    header .sub{font-size:12px;}
    .prog{margin-left:0;width:100%;}
    .prog .bar{flex:1;}

    /* Панель режимов */
    .mode-bar{padding:.6rem 1rem;gap:0;}
    .mode-btn{padding:7px 14px;font-size:13px;flex:1;text-align:center;}

    /* Лейаут */
    .layout{min-height:calc(100vh - 110px);}
    .main{padding:.9rem 1rem;max-width:100%;}

    /* Карточки вопросов */
    .q-head{padding:11px 12px;gap:8px;}
    .q-question{font-size:13.5px;}
    .q-ans{padding:10px 12px 12px 12px;font-size:13px;}

    /* Флэш-карточки */
    .fc-wrap{max-width:100%;}
    .fc-card{min-height:170px;padding:1.25rem;}
    .fc-question{font-size:14px;}
    .fc-actions{gap:8px;}
    .fc-btn{padding:10px 18px;font-size:13px;flex:1;text-align:center;}
    .fc-secs{gap:6px;}
    .fc-sb{font-size:11px;padding:4px 10px;}

    /* Квиз */
    .quiz-wrap{max-width:100%;}
    .quiz-q{padding:.9rem 1rem;}
    .quiz-qtext{font-size:13.5px;}
    .quiz-opt{padding:10px 12px;font-size:13px;}
    .btn-p,.btn-s{width:100%;text-align:center;}
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Коллоквиум — Химия</h1>
    <div class="sub">Вопросы 314–425 · все темы</div>
  </div>
  <div class="prog">
    <span id="prog-text">0 / 0 выучено</span>
    <div class="bar"><div class="fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</header>
<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('read')">📖 Конспект</button>
  <button class="mode-btn" onclick="setMode('flash')">🃏 Карточки</button>
  <button class="mode-btn" onclick="setMode('quiz')">✅ Тест</button>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div id="read-mode"></div>
    <div id="flashcard-mode">
      <div class="fc-wrap">
        <div class="fc-secs" id="fc-secs"></div>
        <div class="fc-counter" id="fc-counter"></div>
        <div class="fc-card" id="fc-card" onclick="revealCard()">
          <div class="fc-qnum" id="fc-qnum"></div>
          <div class="fc-question" id="fc-question"></div>
          <div class="fc-answer" id="fc-answer"></div>
        </div>
        <div class="fc-hint" id="fc-hint">Нажми на карточку, чтобы увидеть ответ</div>
        <div class="fc-actions" id="fc-actions" style="display:none">
          <button class="fc-btn bad" onclick="rateCard(false)">✗ Не знаю</button>
          <button class="fc-btn" onclick="skipCard()">→ Пропустить</button>
          <button class="fc-btn good" onclick="rateCard(true)">✓ Знаю</button>
        </div>
      </div>
    </div>
    <div id="quiz-mode">
      <div class="quiz-wrap">
        <div style="display:flex;align-items:center;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap;">
          <div style="font-family:'Unbounded',sans-serif;font-size:.85rem;color:var(--accent)">Проверь себя</div>
          <div id="quiz-score-badge"></div>
          <button class="btn-s" style="margin-left:auto" onclick="generateQuiz()">Новые вопросы</button>
        </div>
        <div id="quiz-container"></div>
        <div style="display:flex;gap:10px;margin-top:1.25rem;">
          <button class="btn-p" onclick="checkQuiz()">Проверить ответы</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const DATA = [
  { id:"s1", title:"Поверхностные явления", color:"#7c6ff7", items:[
    { n:314, q:"Поверхностные явления. Особенности строения поверхностного слоя фазы",
      a:`<b>Поверхностные явления</b> — явления, протекающие на <b>границе раздела фаз</b>, обусловленные особенностями строения поверхностного слоя (толщина = 1–2 диаметра молекул).<br><br>
      <b>Особенности поверхностного слоя:</b>
      <ul><li>Поверхностное натяжение</li><li>Адсорбция</li><li>Капиллярная конденсация</li><li>Повышенная избыточная энергия</li><li>Малая толщина</li></ul>`,
      key:"Граница раздела фаз; толщина 1–2 диаметра молекул" },
    { n:315, q:"Поверхностная энергия Гиббса. Факторы, влияющие на её величину",
      a:`<span class="formula">Gs = σ · S</span> — σ поверхностное натяжение, S — площадь поверхности.<br><br>
      По II закону термодинамики система стремится снизить избыточную энергию:
      <ul><li>Уменьшение S — укрупнение частиц</li><li>Уменьшение σ — сорбция ПАВ на поверхности</li></ul>`,
      key:"Gs = σ·S; снижение через ↓S или ↓σ" },
    { n:316, q:"Поверхностное натяжение: энергетическое и силовое определения",
      a:`<div class="hl"><b>Силовое:</b> молекулы внутри фазы окружены молекулами со всех сторон → равнодействующая = 0. Молекулы поверхностного слоя — только со стороны объёма → равнодействующая <b>направлена внутрь фазы</b>.</div>
      <div class="hl"><b>Энергетическое:</b> молекулы поверхностного слоя обладают <b>избыточной энергией</b> по сравнению с молекулами объёма фазы.</div>`,
      key:"Силовое: сила внутрь. Энергетическое: избыточная энергия" },
    { n:317, q:"Зависимость поверхностного натяжения от природы вещества, температуры и давления",
      a:`<b>От природы:</b>
      <ul><li>Полярность↑ → σ↑</li><li>Больше водородных связей → σ↑</li><li>Чище вещество → σ↑</li><li>Жидкости: σ конечно; газы: σ ≈ 0</li></ul>
      <b>От температуры:</b> Т↑ → σ↓ (у критической точки = 0, жидкость закипает)<br>
      <b>От давления:</b> P↑ → σ↓ (уменьшается концентрация в газовой фазе)`,
      key:"Т↑→σ↓; P↑→σ↓; полярность↑→σ↑" },
    { n:318, q:"Способы измерения поверхностного натяжения жидкости (4 метода)",
      a:`<b>1. Сталлагмометрический (метод капель)</b><br>
      Считают число капель фиксированного объёма; масса капли ∝ σ.<br>
      <span class="formula">σₓ = σ₀ · n₀ / nₓ</span><br><br>
      <b>2. Метод отрыва кольца</b><br>
      Измеряют силу F отрыва кольца от поверхности.<br>
      <span class="formula">σ = F / π(d₁+d₂)</span><br><br>
      <b>3. Метод максимального давления пузырьков</b><br>
      Вдувают воздух через капилляр; в момент отрыва пузырька давление максимально.<br>
      <span class="formula">P_max = 2σ/r</span> → <span class="formula">σₓ = σ₀ · Pₓ/P₀</span><br><br>
      <b>4. Метод капиллярного поднятия</b><br>
      Жидкость поднимается на высоту h до уравновешивания силы натяжения и силы тяжести.<br>
      <span class="formula">σ = h·r·ρ·g / 2</span>`,
      key:"Капли: n₀/nₓ | Кольцо: F/π(d₁+d₂) | Пузырьки: 2σ/r | Капилляр: hrρg/2" },
  ]},
  { id:"s2", title:"Уравнение Гиббса и ПАВ", color:"#4ecdc4", items:[
    { n:319, q:"Распределение растворённого вещества между поверхностным слоем и объёмом",
      a:`Распределение <b>неравномерное</b>. Описывается уравнением Гиббса:<br>
      <span class="formula">Г = −(C/RT) · (Δσ/ΔC)</span><br><br>
      Г — величина адсорбции; Δσ/ΔC — поверхностная активность вещества.<br>
      <ul><li>Г > 0 → концентрация у поверхности <b>выше</b> (положительная адсорбция)</li><li>Г < 0 → концентрация у поверхности <b>ниже</b> (отрицательная адсорбция)</li></ul>`,
      key:"Г = −(C/RT)·(Δσ/ΔC)" },
    { n:320, q:"Классификация растворённых веществ по влиянию на поверхностное натяжение воды",
      a:`<b>ПАВ</b> (поверхностно-активные) — <b>понижают σ</b>. Спирты, органические кислоты, мыла.<br><br>
      <b>ПИВ</b> (поверхностно-инактивные) — <b>повышают σ</b>. Неорганические кислоты, основания, соли.<br><br>
      <b>ПНВ</b> (поверхностно-неактивные) — <b>не изменяют σ</b>. Сахароза, глюкоза.`,
      key:"ПАВ→σ↓; ПИВ→σ↑; ПНВ→σ=const" },
    { n:321, q:"Уравнение Гиббса — анализ по знаку поверхностной активности",
      a:`<span class="formula">Г = −(C/RT)·(Δσ/ΔC)</span><br><br>
      <div class="hl">Δσ/ΔC = 0 → Г = 0 — <b>ПНВ</b> (сахароза, глюкоза): не влияют на σ</div>
      <div class="wn">Δσ/ΔC > 0 → Г < 0 — <b>ПИВ</b>: σ возрастает, концентрация в объёме выше</div>
      <div class="hl">Δσ/ΔC < 0 → Г > 0 — <b>ПАВ</b>: σ уменьшается, концентрация у поверхности выше</div>`,
      key:"3 случая: Г=0 (ПНВ), Г<0 (ПИВ), Г>0 (ПАВ)" },
    { n:322, q:"Строение молекул и свойства ПАВ",
      a:`<b>Строение дифильное:</b>
      <ul><li><b>Гидрофобная часть</b> — углеводородный радикал («хвост»), выталкивается из воды</li><li><b>Гидрофильная часть</b> — карбоксильная (-COOH) или иная полярная группа, втягивается в воду</li></ul>
      Чем длиннее углеводородный радикал → тем меньше растворимость.<br><br>
      <b>Свойства:</b> ограниченно растворимы; σ меньше чем у чистого растворителя; резко изменяют поверхностные свойства.`,
      key:"Дифильные: гидрофобный хвост + гидрофильная голова" },
    { n:323, q:"Классификация ПАВ",
      a:`<b>Молекулярные (неионогенные)</b> — желчь, белковые вещества. Не диссоциируют.<br><br>
      <b>Ионогенные анионактивные</b> — мыла, сульфокислоты и их соли, карбоновые кислоты. В растворе дают анион с поверхностной активностью.<br><br>
      <b>Ионогенные катионактивные</b> — органические азотсодержащие основания и их соли. Дают катион с поверхностной активностью.`,
      key:"Неионогенные / Анионактивные (мыла) / Катионактивные" },
    { n:324, q:"Правило Дюкло-Траубе",
      a:`Удлинение углеводородной цепи на одну группу <span class="formula">–CH₂–</span> увеличивает поверхностную активность ПАВ в <b>2–3 раза</b>.<br><br>
      <div class="wn">Применимо только для <b>разбавленных растворов</b> при температуре, близкой к комнатной — с нагревом десорбция усиливается и правило нарушается.</div>`,
      key:"+CH₂ → активность ×3; разбавленные р-ры, ~20°C" },
    { n:325, q:"Расположение молекул ПАВ в поверхностном слое",
      a:`При <b>малой концентрации</b>: гидрофобный радикал расположен произвольно (горизонтально или под углом).<br><br>
      При <b>высокой концентрации</b>: молекулы растворителя в поверхностном слое полностью замещаются на ПАВ. Гидрофобные радикалы ориентируются <b>перпендикулярно</b> к поверхности — <b>«частокол Ленгмюра»</b>.`,
      key:"Высокая концентрация → «частокол Ленгмюра»" },
    { n:326, q:"Изотерма поверхностного натяжения. Сравнение для карбоновых кислот",
      a:`С увеличением концентрации ПАВ σ уменьшается до предела — момент полного замещения молекул растворителя на ПАВ в поверхностном слое.<br><br>
      Поверхностная активность возрастает в ряду:<br>
      <span class="formula">НСООН &lt; CH₃COOH &lt; CH₃CH₂COOH</span><br><br>
      Т.е. чем длиннее цепь — тем выше активность (правило Дюкло-Траубе).`,
      key:"Длиннее цепь → активнее: НСООН < CH₃COOH < C₂H₅COOH" },
    { n:327, q:"Механизм действия ПАВ при кессонной болезни",
      a:`ПАВ снижают σ на границе газ–жидкость и <b>препятствуют слиянию мелких пузырьков в крупные</b>, тем самым ускоряя растворение газа обратно в крови.<br><br>
      <div class="wn">ПАВ облегчают течение кессонной болезни, но <b>не заменяют</b> рекомпрессию в барокамере.</div>`,
      key:"Препятствуют слиянию пузырьков → ускоряют растворение газа" },
    { n:328, q:"Применение ПАВ в медицине и в быту",
      a:`<b>В медицине:</b>
      <ul><li>Пульмонология — лёгочный сурфактант (тяжёлая пневмония, ОРДС)</li><li>Анестезиология — ИВЛ, ингаляционные смеси</li><li>Фармация — мази, эмульсии</li><li>Дезинфекция</li></ul>
      <b>В быту:</b>
      <ul><li>Основа моющих средств (мыла, шампуни, стиральные порошки)</li><li>Косметика (кремы, гели)</li><li>Пищевая промышленность — эмульгаторы (соусы, шоколад, мороженое)</li><li>Агрохимия — растворы удобрений</li></ul>`,
      key:"Сурфактант, мази, эмульсии, моющие средства" },
  ]},
  { id:"s3", title:"Адсорбция", color:"#ff6b6b", items:[
    { n:329, q:"Определения: сорбция, адсорбция, абсорбция, сорбент, сорбтив",
      a:`<b>Сорбция</b> — поглощение каким-либо веществом других веществ.<br>
      <b>Сорбент</b> — вещество, которое поглощает.<br>
      <b>Сорбтив</b> — поглощаемое вещество.<br>
      <b>Адсорбция</b> — поглощение вещества <b>поверхностью</b> сорбента.<br>
      <b>Абсорбция</b> — поглощение вещества <b>всем объёмом</b> сорбента.`,
      key:"Адсорбция = поверхность; Абсорбция = объём" },
    { n:330, q:"Физическая и химическая адсорбция — характеристика",
      a:`<b>Физическая:</b> силы Ван-дер-Ваальса. Теплота <b>4–40 кДж/моль</b>. <b>Обратима</b>.<br><br>
      <b>Химическая (хемосорбция):</b> + химические связи между сорбтивом и сорбентом. Теплота <b>40–400 кДж/моль</b>.`,
      key:"Физ: 4–40 кДж, обратима; Хим: 40–400 кДж" },
    { n:331, q:"Количественное выражение адсорбции на твёрдом и жидком адсорбентах",
      a:`<span class="formula">Г = X / S(m)</span><br><br>
      X — количество адсорбтива (моль)<br>
      S — площадь поверхности адсорбента (м²)<br>
      m — масса адсорбента (кг)`,
      key:"Г = X/S(m); моль/м² или моль/кг" },
    { n:332, q:"Изотерма адсорбции — характеристика трёх участков",
      a:`Зависимость адсорбции от концентрации адсорбтива при постоянной температуре.<br><br>
      <b>Участок 1:</b> адсорбция прямо пропорциональна концентрации.<br>
      <b>Участок 2:</b> скорость адсорбции уменьшается, зависимость теряет линейный характер.<br>
      <b>Участок 3:</b> скорость адсорбции не растёт, адсорбция <b>максимальна (Г∞)</b> — монослой заполнен.`,
      key:"1: линейно; 2: нелинейно; 3: насыщение Г∞" },
    { n:333, q:"От каких факторов зависит адсорбция газов жидкими и твёрдыми телами",
      a:`<ul>
      <li><b>Природа:</b> полярный адсорбент ↔ полярное вещество; неполярный ↔ неполярное</li>
      <li><b>Смачивание:</b> чем лучше сорбент смачивается веществом → тем лучше адсорбция</li>
      <li><b>Удельная поверхность:</b> S_уд = S/m. Больше S_уд → лучше адсорбция (активированный уголь — 500–1000 м²/г)</li>
      <li><b>Температура:</b> адсорбция — экзотермический процесс; Т↑ → адсорбция↓</li>
      <li><b>Концентрация/давление:</b> C↑ или P↑ → адсорбция↑</li></ul>`,
      key:"Природа, смачивание, S_уд, Т (↑→↓), C/P (↑→↑)" },
    { n:334, q:"Изотерма Фрейндлиха — уравнение и нахождение констант",
      a:`<span class="formula">Г = K_Ф · Cⁿ</span><br><br>
      K_Ф — константа Фрейндлиха; C — концентрация или давление; n — константа процесса (0,1 ≤ n ≤ 0,6).<br><br>
      <b>Логарифмическая форма:</b> <span class="formula">lg Г = lg K_Ф + n · lg C</span><br>
      График lgГ от lgC — прямая; угол наклона = n, отрезок на оси = lgK_Ф.<br>
      <div class="wn">Не соответствует данным опыта при очень малых и очень больших концентрациях.</div>`,
      key:"Г = KФ·Cⁿ; lgГ = lgKФ + n·lgC; n=0,1–0,6" },
    { n:335, q:"Изотерма Ленгмюра — уравнение и анализ",
      a:`<span class="formula">Г = Г∞ · C / (K_л + C)</span><br><br>
      Г∞ — предельная адсорбция (монослой); K_л — константа Ленгмюра.<br><br>
      <b>Анализ:</b>
      <ul><li>C → 0: <span class="formula">Г ≈ Г∞·C/K_л</span> — линейный (1-й участок)</li><li>C >> K_л: <span class="formula">Г → Г∞</span> — насыщение (3-й участок)</li></ul>`,
      key:"Г = Г∞·C/(Kл+C); при C>>Kл → Г=Г∞" },
    { n:336, q:"Выражение адсорбции из растворов на твёрдых адсорбентах. Зависимость от растворённого вещества",
      a:`<span class="formula">Г = (C₀ − C) · V / m</span><br><br>
      C₀ — начальная концентрация; C — равновесная концентрация; V — объём; m — масса адсорбента.<br><br>
      <b>Закономерности:</b>
      <ul><li>Чем лучше вещество растворяется → тем <b>хуже</b> адсорбируется</li><li>Лучше адсорбируется из <b>низких концентраций</b></li><li>Т↑ → адсорбция↓</li></ul>`,
      key:"Г=(C₀−C)·V/m; хорошо растворяется → плохо адсорбируется" },
    { n:337, q:"Влияние природы адсорбента. Гидрофильные и гидрофобные адсорбенты",
      a:`<ul><li>Неполярные адсорбенты → адсорбируют неполярные вещества</li><li>Полярные → адсорбируют полярные</li><li>Растворитель <b>мешает</b> адсорбции — молекулы растворителя конкурируют с сорбтивом</li><li>Неэлектролиты и слабые электролиты адсорбируются в виде молекул</li></ul>
      <b>Примеры:</b> активированный уголь — <b>неполярный</b>; силикагель — <b>полярный</b>.`,
      key:"Уголь — неполярный; силикагель — полярный" },
    { n:338, q:"Правило выравнивания полярностей Ребиндера",
      a:`<ul><li>На <b>полярных</b> адсорбентах лучше адсорбируются <b>полярные</b> вещества из <b>неполярных</b> растворителей</li>
      <li>На <b>неполярных</b> адсорбентах лучше адсорбируются <b>неполярные</b> из <b>полярных</b> растворителей</li>
      <li>Хорошая растворимость → плохая адсорбция</li></ul>
      <div class="hl">Вода – уголь: правило Дюкло-Траубе (адсорбция с ростом цепи↑)<br>Бензол – Al₂O₃: обращённое правило (адсорбция с ростом цепи↓)</div>`,
      key:"Подобное адсорбируется из противоположного растворителя" },
    { n:339, q:"Ориентация молекул ПАВ при адсорбции на твёрдых адсорбентах",
      a:`Молекулы ПАВ располагаются <b>перпендикулярно</b> поверхности адсорбента:<br>
      <ul><li>Гидрофильная часть — обращена <b>к адсорбенту</b></li><li>Гидрофобная часть (хвост) — обращена <b>в раствор</b></li></ul>`,
      key:"Перпендикулярно: гидрофил к адсорбенту, гидрофоб в раствор" },
    { n:340, q:"Правило Дюкло-Траубе для адсорбции ПАВ на твёрдых адсорбентах",
      a:`<b>Для неполярных адсорбентов (вода–уголь):</b> с ростом длины углеводородной цепи адсорбция <b>увеличивается</b> в 3,2 раза на каждую –CH₂–.<br><br>
      <b>Обращённое правило (бензол–Al₂O₃, полярный адсорбент):</b> с ростом цепи адсорбция <b>уменьшается</b>.`,
      key:"Неполярный адсорбент: цепь↑→адсорбция↑; полярный — наоборот" },
    { n:341, q:"Особенности адсорбции сильных электролитов на твёрдых адсорбентах",
      a:`За счёт <b>электростатического взаимодействия</b> и межмолекулярного притяжения.<br>
      На поверхности адсорбента преимущественно адсорбируются ионы <b>одного знака</b> — с зарядом, <b>противоположным функциональной группе адсорбента</b>.`,
      key:"Адсорбируются ионы противоположного знака" },
    { n:342, q:"Зависимость адсорбционной способности ионов от заряда и размера",
      a:`<b>По заряду:</b> многовалентные ионы адсорбируются лучше одновалентных (кроме H⁺).<br>
      Ряд: <span class="formula">H⁺ > Fe³⁺ > Al³⁺ > Ba²⁺ > Ca²⁺ > Mg²⁺ > NH₄⁺ > K⁺ > Na⁺</span><br><br>
      <b>По размеру</b> (при равном заряде): лучше адсорбируются <b>большие ионы</b> — они менее гидратированы.`,
      key:"Больший заряд → лучше; больший размер (меньше гидратация) → лучше" },
    { n:343, q:"Лиотропные ряды адсорбционной способности катионов и анионов",
      a:`<b>Катионы:</b> <span class="formula">Cs⁺ > Rb⁺ > NH₄⁺ > K⁺ > Na⁺ > Li⁺</span><br><br>
      <b>Анионы:</b> <span class="formula">NO₃⁻ > J⁻ > Br⁻ > Cl⁻ > F⁻</span>`,
      key:"Cs>Rb>NH4>K>Na>Li; NO3>J>Br>Cl>F" },
    { n:344, q:"Правило Панета-Фаянса-Пескова",
      a:`На твёрдом адсорбенте адсорбируется тот ион, который <b>входит в состав адсорбента</b> или имеет с ним <b>общую группу</b>.<br><br>
      <b>Пример:</b> AgNO₃ + KJ = AgJ↓ + KNO₃<br>
      <ul><li>Избыток AgNO₃ → адсорбируются Ag⁺ → заряд осадка <b>«+»</b></li><li>Избыток KJ → адсорбируются J⁻ → заряд осадка <b>«−»</b></li></ul>
      <div class="hl">Это правило определяет знак заряда мицеллы!</div>`,
      key:"Адсорбируется ион из состава адсорбента" },
    { n:345, q:"Ионообменная адсорбция и её применение",
      a:`<b>Ионообменная адсорбция</b> — замена на адсорбенте одного иона другими ионами из раствора.<br><br>
      <b>Применение:</b> очистка сточных вод, хроматография, антацидные средства, консервирование крови.`,
      key:"Замена иона на ион в растворе" },
    { n:346, q:"Иониты, катиониты, аниониты. Обменная ёмкость. Регенерация",
      a:`<b>Иониты</b> — твёрдые вещества с сетчатой структурой.<br>
      <b>Катиониты (RH)</b> — обмениваются катионами (полимерные многоосновные кислоты).<br>
      <b>Аниониты (ROH)</b> — обмениваются анионами (полимерные многокислотные основания).<br><br>
      <b>Обменная ёмкость</b> — кол-во ммоль ионов, поглощённых 1 г сухого ионита.<br><br>
      <b>Регенерация:</b> катиониты → промывают <b>кислотой</b>; аниониты → промывают <b>щёлочью</b>.`,
      key:"RH = катионит (H₂SO₄ для регенерации); ROH = анионит (NaOH)" },
  ]},
  { id:"s4", title:"Хроматография", color:"#ffd166", items:[
    { n:347, q:"Хроматография — сущность и цели",
      a:`<b>Хроматография</b> — физико-химический метод разделения смеси веществ, основанный на различном распределении компонентов между двумя фазами:
      <ul><li><b>Неподвижная</b> — адсорбент с большой поверхностью контакта</li><li><b>Подвижная</b> — поток растворителя через неподвижную фазу</li></ul>
      <b>Цели:</b> анализ аминокислот и белков, определение витаминов и гормонов, допинг-контроль, диагностика заболеваний, анализ крови на алкоголь и наркотики.`,
      key:"2 фазы: неподвижная (адсорбент) + подвижная (растворитель)" },
    { n:348, q:"Классификация хроматографии по механизму процесса",
      a:`<ul><li><b>Адсорбционная</b> — различная способность к адсорбции</li><li><b>Распределительная</b> — различное распределение вещества в двух жидких фазах</li><li><b>Молекулярно-ситовая</b> — разделение по размеру молекул</li><li><b>Хемосорбционная</b> — основана на химическом процессе</li></ul>`,
      key:"Адсорбционная / Распределительная / Молекулярно-ситовая / Хемосорбционная" },
    { n:349, q:"Классификация хроматографии по агрегатному состоянию подвижной фазы и по технике",
      a:`<b>По технике:</b> колоночная (капиллярная) и тонкослойная (бумажная).<br><br>
      <b>По агрегатному состоянию подвижной фазы:</b>
      <ul><li>ЖАХ — жидкостно-адсорбционная</li><li>ЖЖХ — жидкостно-жидкостная</li><li>ГАХ — газо-адсорбционная</li><li>ГЖХ — газо-жидкостная</li></ul>`,
      key:"ГАХ, ГЖХ, ЖАХ, ЖЖХ; по технике: колоночная / тонкослойная" },
    { n:350, q:"Колоночная и тонкослойная хроматография — сущность",
      a:`<b>Колоночная</b> — разделение проводится в специальных колонках, заполненных твёрдым сорбентом.<br><br>
      <b>Тонкослойная</b> — разделение проводится в тонком слое сорбента (на пластине или бумаге).`,
      key:"Колоночная = в колонке; тонкослойная = на пластине" },
    { n:351, q:"Аффинная (биоспецифическая) хроматография",
      a:`Основана на <b>специфическом биологическом взаимодействии</b> (фермент–субстрат, антиген–антитело).<br><br>
      Стационарная фаза содержит один из партнёров пары. Из анализируемой смеси с высокой специфичностью «вылавливается» второй партнёр.`,
      key:"Специфическое взаимодействие фермент–субстрат (антиген–антитело)" },
    { n:352, q:"Молекулярно-ситовая хроматография",
      a:`Разделение веществ по <b>размеру молекул</b>. Стационарная фаза — пористые молекулярные сита, проницаемые только для молекул определённого размера.<br><br>
      <b>Крупные молекулы</b> не попадают в поры → движутся быстрее.<br>
      <b>Мелкие молекулы</b> задерживаются в порах → движутся медленнее.`,
      key:"Крупные молекулы идут быстрее (не входят в поры)" },
    { n:353, q:"Гемосорбция — сущность",
      a:`<b>Гемосорбция</b> — метод лечения, направленный на удаление токсинов из крови путём контакта крови с сорбентом <b>вне организма</b>.<br><br>
      Основана на:
      <ul><li><b>Адсорбции</b> — фиксация молекулы на поверхности поглотителя</li><li><b>Абсорбции</b> — фиксация в объёме поглотителя</li></ul>`,
      key:"Внеорганизменная очистка крови сорбентом" },
  ]},
  { id:"s5", title:"Дисперсные системы", color:"#52e09c", items:[
    { n:354, q:"Дисперсная система, дисперсная фаза, дисперсионная среда",
      a:`<b>Дисперсная система</b> — гетерогенная система, в которой одно вещество (дисперсная фаза) раздроблено и равномерно распределено в объёме другого (дисперсионная среда). Между ними есть поверхность раздела.<br><br>
      <b>Дисперсная фаза</b> — раздробленное вещество.<br>
      <b>Дисперсионная среда</b> — однородное вещество, в котором распределена фаза.`,
      key:"Фаза раздроблена в среде; есть поверхность раздела" },
    { n:355, q:"Степень дисперсности. Способы выражения",
      a:`<b>Степень дисперсности</b> — раздроблённость вещества.<br><br>
      <b>По Думанскому:</b> <span class="formula">D = 1/d</span> (м⁻¹), где d — диаметр частицы<br>
      <b>По Освальду:</b> <span class="formula">S_уд = S_ф/V_ф</span> (м⁻¹) — удельная поверхность`,
      key:"D = 1/d; S_уд = S/V" },
    { n:356, q:"Классификация дисперсных систем по степени дисперсности",
      a:`<b>Грубодисперсные</b> — d > 10⁻⁷ м (суспензии, эмульсии). Непрозрачны, отражают свет, не видны в оптический микроскоп.<br><br>
      <b>Коллоидно-дисперсные</b> — 10⁻⁹–10⁻⁷ м. Прозрачны (кажутся), рассеивают свет (конус Тиндаля), проходят через фильтр.<br><br>
      <b>Молекулярно- и ионно-дисперсные</b> — d < 10⁻⁹ м (истинные растворы). Прозрачны, гомогенны, устойчивы, конуса Тиндаля нет.`,
      key:">10⁻⁷: грубые; 10⁻⁹–10⁻⁷: коллоиды; <10⁻⁹: истинные р-ры" },
    { n:357, q:"Сравнение дисперсных систем с различной степенью дисперсности",
      a:`<b>Истинные растворы:</b> частицы = молекулы/ионы; полностью однородны; высокая устойчивость. Пример: NaCl в воде.<br><br>
      <b>Коллоидные системы:</b> промежуточное положение; эффект Тиндаля, броуновское движение; могут коагулировать. Пример: золь золота, молоко, плазма крови.<br><br>
      <b>Грубодисперсные:</b> крупные частицы; легко расслаиваются; нужно перемешивание. Пример: глина в воде.`,
      key:"Размер частиц↑ → устойчивость↓, гетерогенность↑" },
    { n:358, q:"Классификация дисперсных систем по агрегатному состоянию фаз (примеры)",
      a:`<b>Среда — газ:</b> газ/газ = воздух; тв/газ = пыль, дым; жидк/газ = туман.<br><br>
      <b>Среда — жидкость:</b> газ/жидк = пена; тв/жидк = суспензия; жидк/жидк = эмульсия, коллоидные р-ры.<br><br>
      <b>Среда — твёрдое:</b> газ/тв = пенопласт; тв/тв = сплавы, минералы; жидк/тв = жемчуг, желе.`,
      key:"Туман (ж/г), дым (тв/г), пена (г/ж), суспензия (тв/ж), эмульсия (ж/ж)" },
    { n:359, q:"Классификация по характеру взаимодействия фазы и среды",
      a:`<b>Свободно-дисперсные</b> — частицы не связаны между собой, свободно перемещаются (суспензии, аэрозоли, эмульсии).<br><br>
      <b>Связно-дисперсные</b> — дисперсная фаза практически неподвижна, образует сплошную сетку/каркас (гели, пасты, студни, пенопласт).`,
      key:"Свободные (суспензии, эмульсии) vs связные (гели, студни)" },
    { n:360, q:"Условия получения веществ в коллоидном состоянии",
      a:`<ul><li>Дисперсная фаза должна <b>плохо растворяться</b> в дисперсионной среде</li><li>Размер частиц: <b>1–100 нм</b></li><li>Необходимы <b>стабилизаторы</b> — адсорбируются на частицах и создают защитный слой (ВМС, ПАВ)</li></ul>`,
      key:"Плохая растворимость + 1–100 нм + стабилизатор" },
    { n:361, q:"Дисперсионные методы получения коллоидных систем",
      a:`Основаны на <b>дроблении</b> вещества до коллоидной степени.<br><br>
      <ul><li><b>Механические</b> — шаровые и коллоидные мельницы, ступка</li><li><b>Физические</b> — ультразвуковые, электродисперсные</li><li><b>Физико-химические (пептизация)</b> — Fe(OH)₃ + HCl → FeOCl↓ + H₂O → [FeO⁺]Cl⁻</li></ul>`,
      key:"Дробление до 1–100 нм; пептизация — диспергирование осадка" },
    { n:362, q:"Получение коллоидных растворов методом физической конденсации",
      a:`Создание пересыщения изменением физических условий → из молекул образуются коллоидные частицы.<br><br>
      <ul><li><b>Замена растворителя</b> — добавляют растворитель, в котором вещество растворяется хуже → коллоидная фаза</li><li><b>Конденсация паров</b> — испарение → быстрое охлаждение (туман, золи металлов)</li><li><b>Испарение растворителя</b> — концентрация растёт → пересыщение → частицы</li></ul>`,
      key:"Замена растворителя / конденсация паров / испарение" },
    { n:363, q:"Методы химической конденсации",
      a:`Химическая реакция → образование нерастворимого продукта в коллоидном виде.<br><br>
      <ul><li><b>Окисление:</b> 2H₂S + O₂ → 2H₂O + 2S↓</li><li><b>Восстановление:</b> Ag₂O + H₂ → 2Ag↓ + H₂O</li><li><b>Реакция обмена:</b> BaCl₂ + K₂SO₄ → BaSO₄↓ + 2KCl</li></ul>`,
      key:"Окисление, восстановление, обменная реакция → коллоид" },
    { n:364, q:"Получение коллоидных растворов пептизацией",
      a:`<b>Пептизация</b> — диспергирование осадка до коллоидных частиц без его растворения под действием пептизатора.<br><br>
      <b>Механизм:</b> ионы пептизатора адсорбируются на частицах осадка → частицы получают одинаковый заряд → электростатическое отталкивание → осадок распадается в золь.<br><br>
      <b>Примеры:</b> Fe(OH)₃ + FeCl₃ → золь Fe(OH)₃; AgCl + HCl → золь AgCl<br><br>
      <b>Условия:</b> свежий осадок; малое количество пептизатора; интенсивное перемешивание.`,
      key:"Осадок + пептизатор → одинаковый заряд → золь" },
    { n:365, q:"Способы очистки коллоидных растворов от примесей",
      a:`<b>Диализ</b> — малые молекулы/ионы проходят через полупроницаемую мембрану, коллоидные частицы задерживаются.<br>
      Виды: электродиализ, компенсационный диализ, вивидиализ.<br><br>
      <b>Фильтрация:</b> ультрафильтрация, гельфильтрация.`,
      key:"Диализ (мембрана) / электродиализ / ультрафильтрация" },
    { n:366, q:"Диализ и электродиализ — сущность",
      a:`<b>Диализ:</b> коллоидный раствор помещают в мешочек из полупроницаемой мембраны (целлофан, пергамент), погружают в воду. Ионы и малые молекулы диффундируют через мембрану, коллоидные частицы остаются.<br><br>
      <b>Электродиализ:</b> диализ, ускоренный электрическим полем. Ионы примесей направленно мигрируют к электродам (катионы → катод, анионы → анод).`,
      key:"Диализ = мембрана + диффузия; электродиализ = + электрическое поле" },
    { n:367, q:"Компенсационный диализ и вивидиализ",
      a:`<b>Компенсационный диализ</b> — в диализирующую среду вводят вещества-компенсаторы (ионы, НМС), чтобы предотвратить нежелательные потери компонентов (pH, ионная сила). Применение: подготовка биологических растворов, очистка белков и ферментов.<br><br>
      <b>Вивидиализ</b> — диализ через <b>биологические мембраны</b> живого организма (капилляры, клеточные мембраны). Применение: гемодиализ, изучение обмена веществ.`,
      key:"Компенсационный: сохраняет pH и электролиты; вивидиализ = через живую ткань" },
    { n:368, q:"Ультрафильтрация — сущность и цели",
      a:`<b>Ультрафильтрация</b> — мембранный метод разделения, при котором через полупроницаемую мембрану проходят дисперсионная среда и низкомолекулярные компоненты, а коллоидные частицы задерживаются.<br><br>
      <b>Цели:</b> разделение и очистка систем, концентрирование коллоидных растворов, фракционирование по размеру, сохранение структуры частиц.`,
      key:"Мембрана задерживает коллоидные частицы; НМС проходят" },
  ]},
  { id:"s6", title:"Кинетические и оптические свойства", color:"#fd79a8", items:[
    { n:369, q:"Седиментация. Скорость. Седиментационное равновесие",
      a:`<b>Седиментация</b> — оседание частиц под действием силы тяжести или центробежной силы.<br><br>
      <span class="formula">v = (2/9) · r² · g · (ρ − ρ₀) / η</span><br>
      r — радиус частиц; ρ − ρ₀ — разность плотностей; η — вязкость среды.<br><br>
      <b>Седиментационное равновесие:</b> скорость оседания = скорость диффузии. Концентрация постепенно снижается от нижних слоёв к верхним.`,
      key:"v = 2r²g(ρ−ρ₀)/9η; равновесие: осаждение = диффузия" },
    { n:370, q:"Седиментационный анализ. Ультрацентрифугирование",
      a:`<b>Седиментационный анализ:</b> определение размера и фракционного состава частиц, оценка функционального состояния эритроцитов (СОЭ), определение молярного веса полимеров и белков.<br><br>
      <b>Ультрацентрифугирование</b> — разделение в сильном центробежном поле. Применяется для высокодисперсных устойчивых систем, фракционирования коллоидных частиц.`,
      key:"СОЭ — оценка эритроцитов; ультрацентрифуга — мощное поле" },
    { n:371, q:"Броуновское движение. Факторы, влияющие на интенсивность",
      a:`<b>Броуновское движение</b> — хаотичное непрерывное движение частиц дисперсной фазы под действием ударов молекул дисперсионной среды.<br><br>
      <ul><li>Присуще частицам с размером до 10⁻⁶ нм</li><li>Не зависит от природы вещества</li><li>Обусловлено тепловым движением молекул среды</li><li>Т↑ → интенсивность↑; вязкость↑ → интенсивность↓; размер частицы↑ → интенсивность↓</li></ul>`,
      key:"Хаотичные удары молекул среды; Т↑→↑; вязкость↑→↓; размер↑→↓" },
    { n:372, q:"Уравнение Эйнштейна-Смолуховского для броуновского движения",
      a:`<span class="formula">Δx = √(2DT)</span><br><br>
      Δx — среднее смещение частицы; D — коэффициент диффузии; T — время.`,
      key:"Δx = √(2DT)" },
    { n:373, q:"Диффузия в коллоидных системах. Скорость диффузии",
      a:`<b>Диффузия</b> в коллоидных системах — самопроизвольное перемещение частиц вследствие броуновского движения → выравнивание концентрации.<br><br>
      <b>Особенности:</b> скорость в тысячи раз меньше, чем в истинных растворах; Т↑→ скорость↑; вязкость↑→ скорость↓; радиус↑→ скорость↓.<br><br>
      <span class="formula">Δn/Δt = D·S·Δl/Δx</span> (первый закон Фика)`,
      key:"Скорость диффузии коллоидов << истинных р-ров" },
    { n:374, q:"Осмотическое давление коллоидных систем",
      a:`<span class="formula">П = CRT</span> (закон Вант-Гоффа)<br><br>
      <b>Особенности:</b>
      <ul><li>Осмотическое давление коллоидов в 1000× меньше истинных растворов</li><li>1% золь золота — 0,00045 атм; 1% р-р сахарозы — 0,725 атм</li><li>Со временем падает (частицы самоукрупняются)</li><li>Трудно определяется; искажается НМС-примесями</li></ul>`,
      key:"П=CRT; у коллоидов в 1000× меньше чем у истинных р-ров" },
    { n:375, q:"Светорассеяние. Уравнение Рэлея",
      a:`<b>Закон Рэлея:</b> <span class="formula">I = I₀ · R · CV²/λ⁴</span><br><br>
      I — интенсивность рассеянного света; I₀ — падающего; R — константа природы вещества; C — концентрация; V — объём частицы; λ — длина волны.<br><br>
      <b>Следствия:</b> короткие волны (синий, фиолетовый) рассеиваются сильнее (λ⁴ в знаменателе) → небо голубое; рассеяние↑ при V↑ и C↑.`,
      key:"I = I₀·R·CV²/λ⁴; λ↑ → рассеяние↓" },
    { n:376, q:"Опалесценция. Эффект Фарадея-Тиндаля. Дихроизм",
      a:`<b>Конус Фарадея-Тиндаля</b> — при освещении коллоидного раствора пучком света наблюдается светящийся конус при взгляде перпендикулярно лучу. Истинные растворы этого не дают.<br><br>
      <b>Опалесценция</b> — слабая мутность раствора (голубоватый оттенок) — рассеяние света частицами фазы в отражённом свете.<br><br>
      <b>Дихроизм</b> — различная окраска золей при изменении положения относительно луча света; наложение рассеянного света на собственную окраску.`,
      key:"Тиндаль = конус; опалесценция = голубая мутность; дихроизм = разные цвета" },
    { n:377, q:"Факторы, влияющие на окраску золей",
      a:`<ul><li><b>Размер частиц</b> — крупнее → сильнее поглощение; малые → голубоватый</li><li><b>Форма частиц</b> — палочковидные → дихроизм</li><li><b>Природа вещества</b> — собственное поглощение</li><li><b>Концентрация</b> — малая→светлый; высокая→насыщенный</li><li><b>Агрегация</b> — слипание усиливает желто-красные оттенки</li></ul>
      Золь золота: грубодисперсный → синий; высокодисперсный → ярко-красный.`,
      key:"Размер↑→синий→красный; крупные агрегаты→жёлто-красный" },
    { n:378, q:"Ультрамикроскопия — сущность и применение",
      a:`<b>Ультрамикроскопия</b> — метод наблюдения коллоидных частиц, основанный на явлении <b>дифракции</b> света на частицах, размер которых меньше половины длины световой волны.<br><br>
      <b>Применение:</b> определение концентрации и размеров частиц, анализ броуновского движения, контроль чистоты сред.`,
      key:"Дифракция света; видно свечение, а не саму частицу" },
  ]},
  { id:"s7", title:"Электрокинетика и мицелла", color:"#a29bfe", items:[
    { n:379, q:"Электрофорез и электроосмос — прямые электрокинетические явления",
      a:`<b>Электрофорез</b> — перемещение <b>дисперсной фазы</b> в электрическом поле относительно неподвижной дисперсионной среды.<br><br>
      <b>Электроосмос</b> — перемещение <b>дисперсионной среды</b> в электрическом поле вокруг неподвижной дисперсной фазы.`,
      key:"Электрофорез = движение фазы; электроосмос = движение среды" },
    { n:380, q:"Практическое применение электрофореза",
      a:`<b>В технике:</b> фарфоровое дело, очистка воздуха, нанесение защитных плёнок.<br><br>
      <b>В медицине:</b> местное введение лекарств, разделение белков крови на фракции, исследование сывороток и нуклеопротеидов.`,
      key:"Введение лекарств; разделение белков сыворотки" },
    { n:381, q:"Обратные электрокинетические явления: потенциал седиментации и потенциал протекания",
      a:`<b>Потенциал оседания (эффект Дорна)</b> — возникает при смещении заряженных частиц относительно среды (при осаждении).<br><br>
      <b>Потенциал протекания (эффект Квинке)</b> — возникает при течении жидкости через капилляр (смещение жидкой фазы относительно твёрдой).`,
      key:"Дорн = оседание частиц → потенциал; Квинке = течение через капилляр → потенциал" },
    { n:382, q:"Электротермодинамический (φ) и электрокинетический (ζ) потенциалы",
      a:`<b>φ-потенциал (термодинамический)</b> — разность потенциалов между поверхностью ядра частицы и объёмом раствора. Характеризует полный заряд поверхности.<br><br>
      <b>ζ-потенциал (дзета, кинетический)</b> — скачок потенциала на <b>поверхности скольжения</b>. Это часть φ-потенциала, определяемая толщиной диффузного слоя.<br><br>
      При движении частицы часть диффузного слоя «срывается»; граница скольжения — там, где прекращается жёсткая связь с частицей.`,
      key:"φ = полный (ядро→раствор); ζ = на поверхности скольжения (часть φ)" },
    { n:383, q:"Уравнение Гельмгольца-Смолуховского. Электрофоретическая подвижность",
      a:`<span class="formula">v = HEζ / 4πη</span><br><br>
      v — скорость частицы; H — напряжённость; E — диэлектрическая проницаемость; η — вязкость; ζ — дзета-потенциал.<br><br>
      <b>Электрофоретическая подвижность</b> (при H=1):<br>
      <span class="formula">v₀ = Eζ / 4πη</span>`,
      key:"v = HEζ/4πη; подвижность v₀ = Eζ/4πη" },
    { n:384, q:"Строение мицеллы гидрофобного золя (пример AgJ, избыток KJ)",
      a:`<b>Реакция:</b> KJ (избыток) + AgNO₃ = AgJ↓ + KNO₃<br><br>
      <b>Структура:</b>
      <ul><li><b>Агрегат</b> — m молекул AgJ (ядро кристалла)</li><li><b>Потенциалопределяющие ионы</b> — n ионов J⁻ адсорбируются на агрегате</li><li><b>Ядро</b> = агрегат + потенциалопределяющие ионы</li><li><b>Адсорбционный слой</b> = ядро + (n−x) противоионов K⁺</li><li><b>Гранула</b> = ядро + адсорбционный слой → имеет заряд «<b>−</b>»</li><li><b>Диффузный слой</b> = x противоионов K⁺</li><li><b>Мицелла</b> = гранула + диффузный слой → <b>электронейтральна</b></li></ul>
      <div class="hl">Формула: {m[AgJ]ₙ·nJ⁻·(n−x)K⁺}ˣ⁻·xK⁺</div>`,
      key:"Агрегат→ядро→гранула (заряжена)→мицелла (нейтральна)" },
    { n:385, q:"Влияние температуры на дзета-потенциал",
      a:`Два противоположных эффекта:<br>
      <ul><li>Т↑ → диффузный слой расширяется → ζ должен расти</li><li>Т↑ → десорбция потенциалопределяющих ионов → φ уменьшается → ζ уменьшается</li></ul>
      На практике второй эффект обычно преобладает: <b>Т↑ → ζ↓</b>.`,
      key:"Т↑→десорбция→φ↓→ζ↓ (обычно)" },
    { n:386, q:"Влияние разбавления на дзета-потенциал",
      a:`При разбавлении снижается ионная сила среды → возрастает толщина диффузного слоя → <b>|ζ| увеличивается</b> → устойчивость системы повышается.`,
      key:"Разбавление → ионная сила↓ → диффузный слой толще → |ζ|↑" },
    { n:387, q:"Влияние pH среды на дзета-потенциал",
      a:`pH изменяет степень ионизации поверхности частиц → меняет знак и величину ζ.<br><br>
      При pH = изоэлектрической точке: <b>ζ = 0</b>, устойчивость <b>минимальна</b>.<br>
      При удалении от изоэлектрической точки: |ζ| возрастает → устойчивость растёт.`,
      key:"pI → ζ=0 (минимальная устойчивость); отдаление от pI → |ζ|↑" },
  ]},
  { id:"s8", title:"Коагуляция и устойчивость", color:"#ff9f43", items:[
    { n:388, q:"Кинетическая устойчивость коллоидных растворов",
      a:`<b>Кинетическая устойчивость</b> — способность дисперсных частиц <b>удерживаться во взвешенном состоянии</b>.<br><br>
      <b>Факторы:</b>
      <ul><li>Броуновское движение</li><li>Степень дисперсности</li><li>Вязкость дисперсионной среды</li><li>Разность плотностей фазы и среды (Δρ)</li></ul>`,
      key:"Удержание во взвеси; факторы: броуновское движение, дисперсность, вязкость, Δρ" },
    { n:389, q:"Агрегативная устойчивость коллоидных растворов",
      a:`<b>Агрегативная устойчивость</b> — способность частиц <b>противостоять слипанию</b> (сохранять степень дисперсности).<br><br>
      <b>Факторы:</b>
      <ul><li>Заряд частиц (ζ-потенциал)</li><li>Сольватная (гидратная) оболочка</li><li>Температура</li></ul>`,
      key:"Противостоять агрегации; ζ-потенциал + сольватная оболочка" },
    { n:390, q:"Коагуляция и старение золей. Факторы коагуляции",
      a:`<b>Коагуляция</b> — объединение коллоидных частиц в более крупные агрегаты.<br>
      <b>Старение</b> — самопроизвольная коагуляция золей.<br><br>
      <b>Факторы:</b> температура, концентрация золя, электрический ток, лучистая энергия, добавление электролитов.`,
      key:"Коагуляция = слипание; главный фактор — электролиты" },
    { n:391, q:"Механизм коагулирующего действия электролитов",
      a:`<ul><li>Сжатие диффузного слоя противоионами</li><li>Избирательная адсорбция ионов на поверхности частицы</li><li>Уменьшение ζ-потенциала</li><li>Уменьшение расклинивающего действия дисперсионной среды</li></ul>`,
      key:"Сжатие диффузного слоя → ζ↓ → агрегация" },
    { n:392, q:"Порог коагуляции. Правило Шульце-Гарди",
      a:`<b>Порог коагуляции</b> — минимальная концентрация электролита (ммоль/л), которую нужно добавить к 1 л золя, чтобы вызвать его <b>явную коагуляцию</b>.<br><br>
      <b>Правило Шульце-Гарди:</b> коагулирует тот ион, заряд которого <b>противоположен заряду гранулы</b>.<br>
      Двухзарядные — в <b>десятки</b> раз активнее одновалентных;<br>
      Трёхзарядные — в <b>сотни</b> раз активнее.<br><br>
      <b>Пример</b> (As₂S₃, гранула «−»): K⁺ : Ba²⁺ : Al³⁺ = 1 : 72 : 540`,
      key:"Порог = мин. ммоль/л; з²→×10, з³→×100 (Шульце-Гарди)" },
    { n:393, q:"Лиотропные ряды коагулирующей способности ионов",
      a:`<b>Катионы:</b> <span class="formula">Cs⁺ > Rb⁺ > K⁺ > Na⁺ > Li⁺</span><br>
      <b>Двухвалентные:</b> <span class="formula">Ba²⁺ > Sr²⁺ > Ca²⁺ > Mg²⁺ > Be²⁺</span><br><br>
      Аналогичные ряды составляются для анионов (по коагулирующему действию на положительно заряженные гранулы).`,
      key:"Cs>Rb>K>Na>Li; Ba>Sr>Ca>Mg>Be" },
    { n:394, q:"Чередование зон коагуляции. Перезарядка частиц",
      a:`При добавлении многозарядных ионов (большая адсорбционная способность):<br>
      <ul><li>Малые дозы → нет коагуляции</li><li>Доза ≥ порога → коагуляция</li><li>Избыток → перезарядка частицы → ζ меняет знак → новая зона устойчивости</li><li>Ещё больше → снова коагуляция</li></ul>`,
      key:"Перезарядка многозарядными ионами → чередование зон коагуляции" },
    { n:395, q:"Кинетика коагуляции: скрытая, явная, медленная, быстрая",
      a:`<b>Скрытая коагуляция</b> — ζ-потенциал уменьшается, видимых изменений нет.<br>
      <b>Явная коагуляция</b> — видимые изменения: помутнение, изменение окраски, осадок.<br>
      <b>Медленная коагуляция</b> — C электролита↑ → скорость коагуляции↑.<br>
      <b>Быстрая коагуляция</b> — C электролита↑ → скорость коагуляции не меняется (все столкновения эффективны).`,
      key:"Скрытая→явная; медленная (C влияет) vs быстрая (C не влияет)" },
    { n:396, q:"Коагуляция смесями электролитов",
      a:`Коагулирующим действием обладают ионы с зарядом, <b>противоположным</b> заряду гранулы.<br><br>
      Для начала коагуляции необходимо достичь <b>порога коагуляции</b>. При совместном действии нескольких электролитов наблюдаются эффекты: аддитивность, антагонизм, синергизм.`,
      key:"Действует ион противоположного знака; нужно достичь порога" },
    { n:397, q:"Явление привыкания при коагуляции",
      a:`При <b>медленном или порционном</b> добавлении электролита коагуляция может не наступить:<br>
      Образуются новые химические соединения (пептизаторы), которые придают частицам достаточный ζ-потенциал → система «привыкает».`,
      key:"Медленное добавление → пептизаторы → нет коагуляции" },
    { n:398, q:"Взаимная коагуляция золей",
      a:`Происходит при смешении двух золей с <b>противоположно заряженными</b> гранулами.<br><br>
      <b>Применение:</b> очистка воды от глины и органики. Al₂(SO₄)₃ + H₂O → Al(OH)₃ (положительный золь) + частицы глины (отрицательный) → взаимная коагуляция.`,
      key:"Смесить золи с разными знаками заряда → взаимная коагуляция" },
    { n:399, q:"Коллоидная защита и её механизм",
      a:`<b>Коллоидная защита</b> — добавление ВМС к гидрофобному золю → адсорбция ВМС на частицах → гидрофильная оболочка → золь приобретает обратимость.<br><br>
      <b>Защитные вещества:</b> белки, углеводы, коллоидные ПАВ.<br><br>
      <b>Значение:</b> колларгол, протаргол (серебро); удержание холестерина в крови белками; профилактика желчных и почечных камней.`,
      key:"ВМС адсорбируется на частице → гидрофильная оболочка → устойчивость" },
    { n:400, q:"Золотое число — количественная характеристика коллоидной защиты",
      a:`<b>Золотое число</b> — количество <b>мг</b> сухого ВМС, которое нужно добавить к <b>10 мл</b> красного золя золота, чтобы предотвратить его коагуляцию при добавлении <b>1 мл 10% NaCl</b>.<br><br>
      <div class="wn">Числа условны: зависят от дисперсности золя, M(ВМС) и pH. Меньше число → лучше защита.</div>`,
      key:"мг ВМС на 10 мл золя; меньше число → лучше защита" },
    { n:401, q:"Значение явления коллоидной защиты",
      a:`<ul><li>Производство лекарств: <b>колларгол</b> и <b>протаргол</b> — защитные белки золей серебра</li><li>Нерастворимый холестерин удерживается в крови белками → профилактика атеросклероза</li><li>Холаты, урохром, муцин — защищают билирубин и холестерин от осаждения</li><li>Предотвращение желчных, почечных камней и подагры</li></ul>`,
      key:"Колларгол/протаргол; холестерин + белки; желчные камни" },
  ]},
  { id:"s9", title:"ВМС — структура и растворение", color:"#55efc4", items:[
    { n:402, q:"ВМС: понятие, молярные массы, классификация по происхождению. Биополимеры",
      a:`<b>ВМС</b> — вещества с молярной массой 10⁴ < M < 10⁶ г/моль, состоящие из повторяющихся мономерных звеньев.<br><br>
      <b>По происхождению:</b>
      <ul><li><b>Природные</b> — каучук, крахмал, целлюлоза, белки, нуклеиновые кислоты</li><li><b>Искусственные</b> (модифицированные) — резина, нитроцеллюлоза</li><li><b>Синтетические</b> — нитрон, капрон, лавсан, синт. каучук</li></ul>
      <b>Биополимеры</b> — природные ВМС, являющиеся структурной основой живых организмов: белки, нуклеиновые кислоты, полисахариды.<br>
      <b>Смешанные:</b> липопротеиды, гликопротеиды, липополисахариды.`,
      key:"М = 10⁴–10⁶; биополимеры: белки, НК, полисахариды" },
    { n:403, q:"Типы пространственной структуры полимеров. Конформации макромолекул",
      a:`<ul><li><b>Линейные</b> — одиночные цепи (каучук, желатин, целлюлоза)</li><li><b>Разветвлённые</b> — (крахмал, гликоген)</li><li><b>Лестничные</b> — двойные параллельные цепи (целлюлозные волокна)</li><li><b>Сетчатые (сшитые)</b> — двух- и трёхмерные структуры</li></ul>
      <b>Конформации</b> — энергетически равноценные пространственные формы, возникающие при повороте мономерных звеньев <b>без разрыва химических связей</b>.`,
      key:"Линейные / разветвлённые / лестничные / сетчатые; конформация = без разрыва связей" },
    { n:404, q:"Сравнение растворов ВМС и гидрофобных коллоидных растворов",
      a:`<table style="font-size:13px;border-collapse:collapse;width:100%">
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;color:var(--muted)"><b>Параметр</b></td><td style="padding:4px 8px;color:var(--accent2)"><b>ВМС</b></td><td style="padding:4px 8px;color:var(--accent3)"><b>Коллоиды</b></td></tr>
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px">Размер</td><td style="padding:3px 8px">&gt;100 нм</td><td style="padding:3px 8px">1–100 нм</td></tr>
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px">Гидрофильность</td><td style="padding:3px 8px">+</td><td style="padding:3px 8px">−</td></tr>
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px">Устойчивость</td><td style="padding:3px 8px">+</td><td style="padding:3px 8px">±</td></tr>
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px">Поверхность раздела</td><td style="padding:3px 8px">−</td><td style="padding:3px 8px">+</td></tr>
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px">Набухание</td><td style="padding:3px 8px">+</td><td style="padding:3px 8px">−</td></tr>
      <tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px">Вязкость</td><td style="padding:3px 8px">высокая</td><td style="padding:3px 8px">низкая</td></tr>
      <tr><td style="padding:3px 8px">Конус Тиндаля</td><td style="padding:3px 8px">размытый</td><td style="padding:3px 8px">чёткий</td></tr>
      </table>`,
      key:"ВМС: гидрофильны, набухают, высокая вязкость; коллоиды: нет набухания, чёткий Тиндаль" },
    { n:405, q:"Набухание полимеров. Степень набухания. Факторы",
      a:`<b>Набухание</b> — увеличение объёма и массы ВМС вследствие поглощения растворителя.<br><br>
      <span class="formula">α = (m − m₀)/m₀ · 100%</span> или <span class="formula">α = (V − V₀)/V₀ · 100%</span><br><br>
      <b>Факторы:</b> температура, степень измельчения, возраст полимера, ионы электролитов, pH среды, природа полимера и растворителя.`,
      key:"α = (m−m₀)/m₀·100%; «подобное растворяется в подобном»" },
    { n:406, q:"Механизм набухания — стадии",
      a:`<b>1-я стадия</b> — <b>сольватация</b> полярных групп молекулами растворителя. Поглощение 20–50% растворителя от массы полимера. Экзотермический процесс.<br><br>
      <b>2-я стадия</b> — <b>осмотическое всасывание</b> растворителя за счёт односторонней диффузии растворителя внутрь полимера.`,
      key:"1: сольватация (20–50%, экзо); 2: осмотическое всасывание" },
    { n:407, q:"Влияние природы вещества на набухание. Классификация по способности к набуханию",
      a:`<b>По способности к набуханию:</b>
      <ul><li><b>Неограниченно набухающие</b> — набухание до полного растворения (линейные полимеры)</li><li><b>Ограниченно набухающие</b> — растворения нет, только увеличение массы (сетчатые полимеры)</li><li><b>Не испытывающие набухания</b> — растворяются без набухания (сферические молекулы: гемоглобин, гликоген)</li></ul>`,
      key:"Линейные = неограниченное; сетчатые = ограниченное; сферические = без набухания" },
    { n:408, q:"Влияние температуры на набухание",
      a:`Повышение температуры:
      <ul><li>Ускоряет процесс набухания (кинетическая энергия молекул↑)</li><li>Может увеличить степень набухания (ослабление межмолекулярных связей)</li></ul>`,
      key:"Т↑ → скорость и степень набухания↑" },
    { n:409, q:"Влияние электролитов на набухание",
      a:`<b>Солевой эффект (высаливание):</b> при высокой концентрации электролит «связывает» воду → меньше воды для гидратации полимера → набухание↓.<br><br>
      <b>Ионное взаимодействие:</b> ионы экранируют заряженные группы на полимерных цепях → уменьшается электростатическое отталкивание → цепи сближаются → набухание↓.`,
      key:"Высокая концентрация электролита → воды меньше → набухание↓" },
    { n:410, q:"Лиотропные ряды ионов по влиянию на набухание",
      a:`Чем слабее ион гидратируется — тем сильнее набухание.<br><br>
      <b>Катионы:</b> <span class="formula">Ba²⁺ > Sr²⁺ > Ca²⁺ > Mg²⁺ > Cs⁺ > Rb⁺ > K⁺ > Na⁺ > Li⁺</span><br>
      <b>Анионы:</b> <span class="formula">CNS⁻ > J⁻ > Br⁻ > NO₃⁻ > Cl⁻ > ацетат > SO₄²⁻</span><br><br>
      Анионы до Cl⁻ — хорошо адсорбируются на полимерах → усиливают набухание.`,
      key:"Слабая гидратация иона → набухание↑; Ba>Sr>Ca>Mg>Cs>K>Na>Li" },
    { n:411, q:"Влияние pH среды на набухание",
      a:`Изменение pH в кислую или щелочную сторону от <b>изоэлектрической точки</b> увеличивает степень набухания:<br>
      Молекулы заряжаются → электростатическое отталкивание между цепями↑ → гидратация↑ → вода проникает между цепями.`,
      key:"Отдаление от pI → заряд↑ → набухание↑" },
    { n:412, q:"Давление набухания — определение и значение",
      a:`<b>Давление набухания</b> — давление, которое оказывает набухающий полимер на ограничивающие его пористые стенки, проницаемые для растворителя.<br><br>
      <b>Примеры:</b> отёк тканей, прорастание зёрен, разрушение горных пород, консервация тканей в анатомических музеях.`,
      key:"Давление набухающего полимера на стенки; примеры: отёк, прорастание семян" },
    { n:413, q:"Коацервация — определение и значение",
      a:`<b>Коацервация</b> — слияние <b>водных оболочек</b> нескольких частиц без объединения самих частиц.<br><br>
      <b>Значение:</b> модель происхождения протоклеток (коацерватные капли Опарина), образование биомолекулярных комплексов (белок–НК), применение в пищевой промышленности, косметологии, фармации.`,
      key:"Слияние водных оболочек; теория Опарина о протоклетках" },
    { n:414, q:"Высаливание ВМС. Схема Кройта",

let knownSet = new Set();
let currentSection = DATA[0].id;
let currentMode = 'read';
let fcPool = [], fcIndex = 0, fcFilter = 'all', fcRevealed = false;
let quizState = [];

const allItems = () => DATA.flatMap(s => s.items);

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  DATA.forEach(sec => {
    const lbl = document.createElement('div');
    lbl.className = 'sb-sec';
    lbl.textContent = sec.title;
    sb.appendChild(lbl);
    const item = sec.items[0];
    const div = document.createElement('div');
    div.className = 'sb-item' + (sec.id === currentSection ? ' active' : '');
    div.setAttribute('data-sid', sec.id);
    const dot = document.createElement('div'); dot.className = 'dot';
    const txt = document.createElement('span');
    txt.textContent = sec.title + ' (' + sec.items.length + ')';
    div.appendChild(dot); div.appendChild(txt);
    div.onclick = () => switchSection(sec.id);
    sb.appendChild(div);
  });
}

function buildReadMode() {
  const c = document.getElementById('read-mode');
  c.innerHTML = '';
  DATA.forEach(sec => {
    const block = document.createElement('div');
    block.className = 'sec-block' + (sec.id === currentSection ? ' visible' : '');
    block.setAttribute('data-section', sec.id);
    const title = document.createElement('div');
    title.className = 'sec-title';
    title.style.color = sec.color;
    title.textContent = sec.title + ' (' + sec.items.length + ' вопросов)';
    block.appendChild(title);
    sec.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'q-card';
      const head = document.createElement('div');
      head.className = 'q-head';
      head.innerHTML = `<span class="q-num">#${item.n}</span><span class="q-question">${item.q}</span><span class="q-arrow">▾</span>`;
      head.onclick = () => { card.classList.toggle('open'); updateProgress(); };
      const ans = document.createElement('div');
      ans.className = 'q-ans';
      ans.innerHTML = item.a + (item.key ? `<div class="key-line">🔑 ${item.key}</div>` : '');
      card.appendChild(head); card.appendChild(ans);
      block.appendChild(card);
    });
    c.appendChild(block);
  });
}

function switchSection(sid) {
  currentSection = sid;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.getAttribute('data-sid') === sid));
  document.querySelectorAll('.sec-block').forEach(el => el.classList.toggle('visible', el.getAttribute('data-section') === sid));
  document.querySelector('.main').scrollTop = 0;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach((b, i) => b.classList.toggle('active', ['read','flash','quiz'][i] === mode));
  document.getElementById('read-mode').style.display = mode === 'read' ? 'block' : 'none';
  document.getElementById('flashcard-mode').style.display = mode === 'flash' ? 'block' : 'none';
  document.getElementById('quiz-mode').style.display = mode === 'quiz' ? 'block' : 'none';
  document.getElementById('sidebar').style.display = mode === 'read' ? 'block' : 'none';
  if (mode === 'flash') buildFCMode();
  if (mode === 'quiz' && quizState.length === 0) generateQuiz();
}

function buildFCMode() {
  const sb = document.getElementById('fc-secs');
  sb.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'fc-sb' + (fcFilter === 'all' ? ' active' : '');
  all.textContent = 'Все темы';
  all.onclick = () => { fcFilter = 'all'; resetFC(); buildFCMode(); };
  sb.appendChild(all);
  DATA.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'fc-sb' + (fcFilter === sec.id ? ' active' : '');
    btn.textContent = sec.title;
    btn.onclick = () => { fcFilter = sec.id; resetFC(); buildFCMode(); };
    sb.appendChild(btn);
  });
  if (!fcPool.length) resetFC();
  showFC();
}

function resetFC() {
  fcPool = (fcFilter === 'all' ? allItems() : (DATA.find(s => s.id === fcFilter)||{items:[]}).items).sort(() => Math.random() - 0.5);
  fcIndex = 0; fcRevealed = false;
}

function showFC() {
  if (!fcPool.length) { document.getElementById('fc-question').textContent = '🎉 Все карточки пройдены!'; document.getElementById('fc-qnum').textContent = ''; document.getElementById('fc-hint').textContent = 'Выбери тему для повтора'; document.getElementById('fc-actions').style.display = 'none'; return; }
  const item = fcPool[fcIndex % fcPool.length];
  document.getElementById('fc-qnum').textContent = `Карточка ${fcIndex + 1} / ${fcPool.length}`;
  document.getElementById('fc-question').textContent = item.q;
  document.getElementById('fc-answer').innerHTML = item.a + (item.key ? `<div class="key-line">🔑 ${item.key}</div>` : '');
  document.getElementById('fc-counter').textContent = `Выучено всего: ${knownSet.size} / ${allItems().length}`;
  document.getElementById('fc-card').classList.remove('revealed');
  document.getElementById('fc-hint').style.display = 'block';
  document.getElementById('fc-actions').style.display = 'none';
  fcRevealed = false;
}

function revealCard() {
  if (fcRevealed) return;
  fcRevealed = true;
  document.getElementById('fc-card').classList.add('revealed');
  document.getElementById('fc-hint').style.display = 'none';
  document.getElementById('fc-actions').style.display = 'flex';
}

function rateCard(known) {
  const item = fcPool[fcIndex % fcPool.length];
  if (known) { knownSet.add(item.n); fcPool.splice(fcIndex % fcPool.length, 1); }
  else { knownSet.delete(item.n); fcIndex++; }
  updateProgress();
  showFC();
}

function skipCard() { fcIndex++; fcRevealed = false; showFC(); }

  { q:"Кольца Лизеганга — это:", opts:["Хроматографические кольца","Периодические реакции осаждения в студне","Структура мицеллы","Форма броуновского движения"], c:1, e:"Кольца Лизеганга = периодическое осаждение в геле. Объясняют слоистость агата и образование камней." },
];

function generateQuiz() {
  const shuffled = [...QDB].sort(() => Math.random() - 0.5).slice(0, 10);
  quizState = shuffled.map(q => ({...q, answered:false, selected:null}));
  document.getElementById('quiz-score-badge').innerHTML = '';
  renderQuiz();
}

function renderQuiz() {
  const c = document.getElementById('quiz-container'); c.innerHTML = '';
  quizState.forEach((q, qi) => {
    const qd = document.createElement('div');
    qd.className = 'quiz-q' + (q.answered ? ' answered' : '');
    qd.setAttribute('data-qi', qi);
    const opts = q.opts.map((o, oi) => {
      let cls = 'quiz-opt';
      if (q.answered) { cls += oi === q.c ? ' correct' : (oi === q.selected ? ' wrong' : ''); cls += ' locked'; }
      return `<button class="${cls}" onclick="selectOpt(${qi},${oi})">${o}</button>`;
    }).join('');
    qd.innerHTML = `<div class="quiz-num">Вопрос ${qi+1}</div><div class="quiz-qtext">${q.q}</div><div class="quiz-opts">${opts}</div><div class="quiz-explain">${q.e}</div>`;
    c.appendChild(qd);
  });
}

function selectOpt(qi, oi) {
  if (quizState[qi].answered) return;
  quizState[qi].selected = oi;
  const cards = document.querySelectorAll('.quiz-opt');
  document.querySelectorAll(`[data-qi="${qi}"] .quiz-opt`).forEach((b, i) => {
    b.style.borderColor = i === oi ? 'var(--accent)' : '';
    b.style.color = i === oi ? 'var(--accent)' : '';
  });
}

function checkQuiz() {
  quizState.forEach(q => { if (q.selected !== null) q.answered = true; });
  renderQuiz();
  const ans = quizState.filter(q => q.answered);
  const cor = ans.filter(q => q.selected === q.c).length;
  const pct = ans.length ? Math.round(cor/ans.length*100) : 0;
  const cls = pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad';
  document.getElementById('quiz-score-badge').innerHTML = `<span class="score-badge ${cls}">${cor}/${ans.length} (${pct}%)</span>`;
}

function updateProgress() {
  const total = allItems().length;
  const pct = Math.round(knownSet.size/total*100);
  document.getElementById('prog-text').textContent = `${knownSet.size} / ${total} выучено`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

buildSidebar(); buildReadMode(); updateProgress();
</script>
